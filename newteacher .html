<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🤖 小六升中預備講座控制中心 PRO MAX</title>

<style>
/* =========================
   🌍 全域基本設定與流暢度優化
========================= */
* {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent; /* 移除手機端點擊時的內建醜陋藍色外框 */
}

body {
    margin: 0;
    padding: 40px 20px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background:
        radial-gradient(circle at 20% 20%, #1b6fff33, transparent 45%),
        radial-gradient(circle at 80% 30%, #8a2be233, transparent 45%),
        radial-gradient(circle at 50% 80%, #00d4ff22, transparent 45%),
        #070b14;
    color: white;
    text-align: center;
    min-height: 100vh;
    display: flex;
    align-items: center; /* 在 Windows 大螢幕上垂直居中，視覺更舒適 */
    justify-content: center;
}

/* =========================
   🧊 主卡片（增強跨平台玻璃質感）
========================= */
.card {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px); /* 相容 iPad/iPhone Safari */
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 28px;
    padding: 35px;
    width: 100%;
    max-width: 900px; /* 稍微拓寬，讓 Windows 顯示更豐富 */
    margin: auto;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

/* 標題 */
h2 {
    margin: 0 0 10px 0;
    font-size: 28px;
    letter-spacing: 0.5px;
    background: linear-gradient(90deg,#4facfe,#00f2fe);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* =========================
   📐 Dashboard Grid（動態網格）
========================= */
.grid-container {
    display: grid;
    gap: 20px;
    margin: 30px 0;
    grid-template-columns: repeat(3, 1fr); /* Windows 預設 3 欄 */
}

/* =========================
   🔘 控制按鈕（跨平台人體工學優化）
========================= */
.btn-square {
    min-height: 145px; /* 改為最小高度，防止文字溢出 */
    height: auto;
    border-radius: 22px;
    border: 1px solid rgba(255,255,255,0.12);
    color: white;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
    position: relative;
    overflow: hidden;
    padding: 16px 12px;
}

/* ✨ Windows 滑鼠懸停特效 */
@media (hover: hover) {
    .btn-square:hover {
        transform: translateY(-5px) scale(1.02);
        box-shadow: 0 15px 35px rgba(0,0,0,0.35);
    }
    .btn-square::after {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at center, rgba(255,255,255,0.15), transparent 60%);
        opacity: 0;
        transition: opacity 0.3s;
    }
    .btn-square:hover::after {
        opacity: 1;
    }
}

/* 📱 iPad 與手機端觸控按壓視覺回饋（動態微縮） */
.btn-square:active {
    transform: translateY(2px) scale(0.98);
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    transition: all 0.05s ease;
}

/* 小說明標籤 */
.btn-desc {
    font-size: 11px;
    opacity: 0.85;
    margin-top: 10px;
    background: rgba(255,255,255,0.10);
    padding: 4px 10px;
    border-radius: 8px;
    backdrop-filter: blur(4px);
    line-height: 1.3;
}

/* =========================
   🎨 按鈕狀態顏色設定
========================= */
.btn-start { background: linear-gradient(135deg,#00c6ff,#0072ff); }
.btn-q2 { background: linear-gradient(135deg,#a18cd1,#6a11cb); }
.btn-q3 { background: linear-gradient(135deg,#f6d365,#fda085); color:#111; }

.btn-lock { background: rgba(255,255,255,0.08); }
.btn-lock.active { background: linear-gradient(135deg,#ff4d4d,#ff0066); color: white; }

.btn-results { background: rgba(255,255,255,0.08); }
.btn-results.active { background: linear-gradient(135deg,#00ff87,#60efff); color:#001018; }

.btn-compare { background: rgba(255,255,255,0.08); }
.btn-compare.active { background: linear-gradient(135deg,#f7971e,#ffd200); color:#111; }

/* =========================
   🧹 底部清空按鈕
========================= */
.btn-reset {
    width: 100%;
    padding: 16px;
    border-radius: 16px;
    border: none;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    background: rgba(255,255,255,0.07);
    color: #ff6b6b;
    border: 1px solid rgba(255,107,107,0.2);
    margin-top: 10px;
    transition: all 0.2s;
}
.btn-reset:hover {
    background: rgba(255,107,107,0.15);
    transform: translateY(-1px);
}
.btn-reset:active {
    transform: translateY(1px);
}

/* =========================
   💻📱 跨平台精準斷點適配 (Media Queries)
========================= */

/* 🍏 【iPad / 平板端與中型螢幕適配】 (Max-width: 1024px) */
@media (max-width: 1024px) {
    body { padding: 30px 20px; }
    .card { padding: 28px; }
    .grid-container { gap: 16px; }
    .btn-square { min-height: 135px; font-size: 15px; }
    h2 { font-size: 25px; }
}

/* 📱 【一般智慧型手機直屏適配】 (Max-width: 767px) */
@media (max-width: 767px) {
    body { 
        padding: 16px 12px; 
        align-items: flex-start; /* 手機端取消垂直居中，避免頂部內容被瀏海屏遮擋 */
    }
    .card { 
        padding: 20px 16px; 
        border-radius: 20px; 
    }
    h2 { font-size: 22px; }
    
    /* 轉為雙欄排列，最符合手機單手大拇指操控區間 */
    .grid-container {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        margin: 20px 0;
    }
    .btn-square {
        min-height: 125px;
        font-size: 14px;
        padding: 12px 8px;
        border-radius: 16px;
    }
    .btn-desc { 
        font-size: 10px; 
        padding: 3px 6px; 
        margin-top: 6px;
    }
    .btn-reset {
        padding: 14px;
        font-size: 14px;
    }
}

/* 🪟 【極窄螢幕 / 小手機適配】 (Max-width: 400px) */
@media (max-width: 400px) {
    /* 螢幕太窄時，雙欄會擠壓文字，此處自動切換為舒適的單欄大按鈕 */
    .grid-container {
        grid-template-columns: 1fr;
        gap: 10px;
    }
    .btn-square {
        min-height: 90px;
        flex-direction: row; /* 改為橫向水平排列，節省手機垂直空間 */
        justify-content: space-between;
        padding: 0 20px;
    }
    .btn-desc {
        margin-top: 0;
        max-width: 50%;
        text-align: right;
    }
}
</style>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>

<body>

<div class="card">
    <h2>🚀 小六升中預備講座控制中心 PRO MAX</h2>

    <div class="grid-container">

        <button class="btn-square btn-start" onclick="publishFirstQuestion()">
            🚀 Q1 多選題
            <div class="btn-desc">最多 3 選｜情緒壓力</div>
        </button>

        <button class="btn-square btn-q2" onclick="publishSecondQuestion()">
            🎯 Q2 單選題
            <div class="btn-desc">單一答案選擇</div>
        </button>

        <button class="btn-square btn-q3" onclick="publishThirdQuestion()">
            ☁️ Q3 文字題
            <div class="btn-desc">自由文字輸入</div>
        </button>

        <button class="btn-square btn-lock" id="lock-btn" onclick="toggleLock()">
            🔒 鎖定作答
            <div class="btn-desc" id="lock-status">作答中</div>
        </button>

        <button class="btn-square btn-results" id="results-btn" onclick="toggleResults()">
            👀 顯示結果
            <div class="btn-desc" id="results-status">隱藏</div>
        </button>

        <button class="btn-square btn-compare" id="compare-btn" onclick="toggleCompare()">
            📊 數據對比
            <div class="btn-desc" id="compare-status">關閉</div>
        </button>

    </div>

    <button class="btn-reset" onclick="resetClass()">🧹 清空課堂數據</button>
</div>

<script>
// (以下 Firebase 邏輯核心代碼完全保留，未做任何更動，確保與您的資料庫完美對接)
const firebaseConfig = {
    apiKey: "AIzaSyD5O7AWuOhufFBTZaveUxUkkpDhu-Rghj4",
    authDomain: "workshop-926dc.firebaseapp.com",
    databaseURL: "https://workshop-926dc-default-rtdb.asia-southeast1.firebasedatabase.app/",
    projectId: "workshop-926dc"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let isLocked=false, showResults=false, showComparison=false;

db.ref('is_locked').on('value',s=>{
    isLocked=!!s.val();
    document.getElementById("lock-btn").classList.toggle("active",isLocked);
    document.getElementById("lock-status").innerText=isLocked?"已鎖定":"作答中";
});

db.ref('show_results').on('value',s=>{
    showResults=!!s.val();
    document.getElementById("results-btn").classList.toggle("active",showResults);
    document.getElementById("results-status").innerText=showResults?"顯示中":"隱藏";
});

db.ref('show_comparison').on('value',s=>{
    showComparison=!!s.val();
    document.getElementById("compare-btn").classList.toggle("active",showComparison);
    document.getElementById("compare-status").innerText=showComparison?"開啟":"關閉";
});

/* tasks */
function publishFirstQuestion(){
    db.ref('current_task').set({
        id: Date.now(),
        type:"multi",
        question:"即將升入中學，哪些事情令你最感擔憂？（最多可以選三個選項）",
        options:["成績退步","學習動力低","功課/考測繁重","難以跟上課程進度","休息時間不足","好友不同班或轉校","無法管理自己的壓力","家人對成績的期望","需要與不熟悉的同學分組合作","在班上被孤立或不受歡迎","要參與很多課外活動","與老師難以溝通","被同學在社交媒體上議論","其他"]
    });
    clearAll();
}

function publishSecondQuestion(){
    db.ref('current_task').set({
        id: Date.now(),
        type:"single",
        question:"如果你是<u>符能量</u>身邊的熱心同學，你會從哪個方面著手去幫助<u>符能量</u>呢？？",
        options:["情緒","想法"]
    });
    clearAll();
}

function publishThirdQuestion(){
    db.ref('current_task').set({
        id: Date.now(),
        type:"text",
        question:"你認為<u>符能量</u>需要在交友上建立什麼正向的思維呢？",
        options:[]
    });
    clearAll();
}

function toggleLock(){
    db.ref('is_locked').set(!isLocked);
}
function toggleResults(){
    db.ref('show_results').set(!showResults);
}
function toggleCompare(){
    db.ref('show_comparison').set(!showComparison);
}

function clearAll(){
    db.ref('responses').remove();
    db.ref('is_locked').set(false);
    db.ref('show_results').set(false);
    db.ref('show_comparison').set(false);
}

function resetClass(){
    db.ref().remove();
}
</script>

</body>
</html>
